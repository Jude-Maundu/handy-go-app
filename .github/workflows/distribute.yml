name: Patch & Distribute

on:
  push:
    branches: [master]

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable

      - uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      # Write the .env file from GitHub secret
      - name: Write .env
        run: echo "${{ secrets.DOTENV }}" > .env

      - name: Get dependencies
        run: flutter pub get

      # ── Patch client flavor ──────────────────────────────────────────────────
      - name: Patch client app
        run: |
          shorebird patch android \
            --flavor client \
            -t lib/flavors/main_client.dart \
            --no-confirm
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      # ── Patch fundi flavor ───────────────────────────────────────────────────
      - name: Patch fundi app
        run: |
          shorebird patch android \
            --flavor fundi \
            -t lib/flavors/main_fundi.dart \
            --no-confirm
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
